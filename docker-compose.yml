# Docker Compose para RabbitMQ con plugin de gestión web.
# Expone el broker AMQP (5672) y la consola de administración (15672).
# Autores: Victor Sanz, Carlos Marques, Sara Cardenas

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: triaje-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
