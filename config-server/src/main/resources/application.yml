# Configuración del Config Server (backend nativo).
# Sirve archivos YAML desde classpath:/configs a los microservicios registrados.
# Autores: Victor Sanz, Carlos Marques, Sara Cardenas

server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs
