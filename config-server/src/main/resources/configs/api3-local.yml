server:
  port: 8083

spring:
  application:
    name: api3-supervisor-medico
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

rabbitmq:
  exchange:
    name: urgencias
  queue:
    name:
      supervisor: q.pacientes.supervisor
  routing:
    key:
      supervisor: pacientes.*
